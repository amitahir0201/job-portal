name: Docker CI/CD to EC2

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Set unique tag
      - name: Set image tag
        run: echo "TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      # Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build & Push Backend
      - name: Build backend image
        run: |
          docker build --no-cache -t amitahir/jobhubnow:backend-${TAG} ./Backend
          docker push amitahir/jobhubnow:backend-${TAG}

      # Build & Push Frontend
      - name: Build frontend image
        run: |
          docker build --no-cache \
            --build-arg VITE_API_URL=${{ secrets.VITE_API_URL }} \
            -t amitahir/jobhubnow:frontend-${TAG} ./frontend

          docker push amitahir/jobhubnow:frontend-${TAG}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on EC2 via SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          echo "$SSH_PRIVATE_KEY" > key.pem
          chmod 600 key.pem

          ssh -i key.pem -o StrictHostKeyChecking=no $EC2_USERNAME@$EC2_HOST << EOF
          cd /var/www/jobhubnow

          # write TAG to .env so docker-compose can use it
          echo "TAG=${{ github.sha }}" > .env

          # stop and remove old containers + images
          docker compose down --rmi all

          # pull new images from Docker Hub
          docker compose pull

          # start fresh containers
          docker compose up -d --force-recreate

          # cleanup
          docker system prune -af
          EOF

          rm key.pem