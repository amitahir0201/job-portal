name: Docker CI/CD to EC2

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Set unique tag using commit SHA
      - name: Set image tag
        run: echo "TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      # Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build & Push Backend
      - name: Build backend image
        run: |
          docker build -t amitahir/jobhubnow:backend-${TAG} ./Backend
          docker push amitahir/jobhubnow:backend-${TAG}

      # Build & Push Frontend
      - name: Build frontend image
        run: |
          docker build \
            --build-arg VITE_API_URL=${{ secrets.VITE_API_URL }} \
            -t amitahir/jobhubnow:frontend-${TAG} ./frontend

          docker push amitahir/jobhubnow:frontend-${TAG}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on EC2 via SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          TAG: ${{ github.sha }}

        run: |
          echo "$SSH_PRIVATE_KEY" > key.pem
          chmod 600 key.pem

          ssh -i key.pem -o StrictHostKeyChecking=no $EC2_USERNAME@$EC2_HOST << EOF

          cd /var/www/jobhubnow

          # Update docker-compose with new tag dynamically
          sed -i "s|backend-.*|backend-$TAG|g" docker-compose.yml
          sed -i "s|frontend-.*|frontend-$TAG|g" docker-compose.yml

          docker compose down
          docker compose pull
          docker compose up -d --force-recreate

          docker system prune -f

          EOF

          rm key.pem