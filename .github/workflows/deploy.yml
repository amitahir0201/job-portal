name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Install backend dependencies
      - name: Install backend dependencies
        working-directory: Backend
        run: npm ci

      # Install frontend dependencies
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      # Build frontend
      - name: Build frontend
        working-directory: frontend
        run: npm run build

      # Create deployment package
      - name: Create deployment package
        run: |
          mkdir deploy

          # copy backend
          cp -r Backend deploy/backend

          # copy frontend build
          cp -r frontend/dist deploy/frontend

          tar -czf deploy.tar.gz -C deploy .

      # Upload artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-package
          path: deploy.tar.gz

  deploy:
    name: Deploy to EC2
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: deployment-package

      - name: Deploy via SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}

        run: |
          echo "$SSH_PRIVATE_KEY" > key.pem
          chmod 600 key.pem

          scp -i key.pem -o StrictHostKeyChecking=no deploy.tar.gz $EC2_USERNAME@$EC2_HOST:/tmp/

          ssh -i key.pem -o StrictHostKeyChecking=no $EC2_USERNAME@$EC2_HOST << 'EOF'

            set -e

            cd /var/www/jobhubnow

            # extract new deployment
            tar -xzf /tmp/deploy.tar.gz
            rm /tmp/deploy.tar.gz

            # install backend dependencies
            cd backend
            npm ci --omit=dev

            # restart app with PM2
            if pm2 describe job-portal > /dev/null 2>&1; then
              pm2 reload ../ecosystem.config.js
            else
              pm2 start ecosystem.config.js
            fi

            pm2 save

          EOF

          rm key.pem